output_dir: ./artifacts/nfkc
corpus:
  - nfcvsnfkc.txt
tokenizer:
  schema_version: "1"
  normalizer:
    type: nfkc
    strip_zero_width: true
  pretokenizer:
    type: whitespace
  model:
    type: bpe
    vocab_size: 8000
  trainer:
    type: bpe
    vocab_size: 8000
    min_frequency: 2
    special_tokens: 
      - "<unk>"