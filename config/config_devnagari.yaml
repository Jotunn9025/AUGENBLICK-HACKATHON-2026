output_dir: ./artifacts/unknown
corpus:
  - corpus.txt
tokenizer:
  schema_version: "1"
  normalizer:
    type: devanagari
    nfc_first: true
    strip_zero_width: true
  pretokenizer:
    type: sequence
    pretokenizers:
      - type: devanagari_aware
        split_on_whitespace: false
        split_on_script_boundary: true
      - type: punctuation
        behavior: isolated
  model:
    type: bpe
    vocab_size: 8000
  trainer:
    type: bpe
    vocab_size: 8000
    min_frequency: 2
    special_tokens: 
      - "<unk>"