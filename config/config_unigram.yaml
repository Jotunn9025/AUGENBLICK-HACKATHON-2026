output_dir: ./artifacts/unigram2
corpus:
  - corpus.txt
tokenizer:
  schema_version: "1"
  normalizer:
    type: devanagari
    nfc_first: true
    strip_zero_width: true
  pretokenizer:
    type: whitespace
  model:
    type: unigram
    vocab_size: 8000
  trainer:
    type: unigram
    vocab_size: 8000
    special_tokens: 
      - "<unk>"